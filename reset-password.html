<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password – Digital Catalogue</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script>
    (function () {
      const l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'styles.css?v=' + Date.now();
      document.head.appendChild(l);
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Local Supabase client with detectSessionInUrl:true so PASSWORD_RECOVERY fires
    window.sb = window.supabase.createClient(
      "https://ytwwcrhtcsdpqeualnsx.supabase.co",
      "sb_publishable_QdZJOKCMMhOa9Xgb1ab-ew_ZJFeVncA",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
        }
      }
    );
  </script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: "Rubik", system-ui, -apple-system, sans-serif;
      background: var(--bg, #87878720);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px 16px;
    }

    .card {
      background: var(--card, #fff);
      padding: 32px;
      width: 100%;
      max-width: 380px;
      border-radius: var(--radius, 14px);
      box-shadow: var(--shadow, 0 10px 25px rgba(0, 0, 0, .08));
      border: 1px solid var(--line, #e5e7eb);
    }

    h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--blue, #003764);
    }

    .subtitle {
      font-size: 13px;
      color: var(--gray, #878787);
      margin: 0 0 24px 0;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray, #878787);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid var(--line, #e5e7eb);
      border-radius: 10px;
      font: 500 14px "Rubik", system-ui, sans-serif;
      background: #fff;
      color: #111827;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      outline: none;
      border-color: rgba(0, 55, 100, .35);
      box-shadow: 0 0 0 3px rgba(0, 55, 100, .12);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--blue, #003764);
      background: var(--gray3, rgba(135, 135, 135, .18));
      color: #111827;
      cursor: pointer;
      font: 700 14px "Rubik", system-ui, sans-serif;
      white-space: nowrap;
      transition: transform .12s ease, box-shadow .16s ease, filter .16s ease;
      box-shadow: var(--sh3d, 0 4px 10px rgba(0, 0, 0, .08));
      margin-bottom: 8px;
    }

    .btn:hover  { filter: brightness(1.04); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .btn.primary {
      background: var(--blue, #003764);
      border-color: var(--blue, #003764);
      color: #fff;
    }

    .errorMsg {
      font-size: 13px;
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      display: none;
    }

    .errorMsg.visible { display: block; }

    .successMsg {
      text-align: center;
      display: none;
    }

    .successMsg.visible { display: block; }

    .successIcon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .successTitle {
      font-size: 18px;
      font-weight: 800;
      color: var(--blue, #003764);
      margin-bottom: 8px;
    }

    .successText {
      font-size: 13px;
      color: var(--gray, #878787);
    }

    .invalidMsg {
      text-align: center;
    }

    .invalidIcon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .invalidTitle {
      font-size: 18px;
      font-weight: 800;
      color: #b91c1c;
      margin-bottom: 8px;
    }

    .invalidText {
      font-size: 13px;
      color: var(--gray, #878787);
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Reset Password</h2>
    <p class="subtitle" id="subtitle">Enter your new password below.</p>

    <!-- Invalid / expired token state -->
    <div id="invalidView" style="display:none;" class="invalidMsg">
      <div class="invalidIcon">⚠️</div>
      <div class="invalidTitle">Link invalid or expired</div>
      <div class="invalidText">This password reset link is invalid or has already been used. Please request a new one.</div>
      <button class="btn primary" type="button" onclick="window.location.href='login.html'">Back to login</button>
    </div>

    <!-- Reset form -->
    <div id="formView">
      <div class="errorMsg" id="errorMsg"></div>

      <label for="password">New Password</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" />

      <label for="confirmPassword">Confirm New Password</label>
      <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat new password" />

      <button id="btnReset" class="btn primary" type="button">Set new password</button>
    </div>

    <!-- Success state -->
    <div id="successView" class="successMsg">
      <div class="successIcon">✅</div>
      <div class="successTitle">Password updated!</div>
      <div class="successText">Redirecting you to login in 3 seconds…</div>
    </div>
  </div>

  <script>
    const sb = window.sb;
    const $ = (id) => document.getElementById(id);

    function showError(msg) {
      const el = $("errorMsg");
      el.textContent = msg;
      el.classList.add("visible");
    }

    function hideError() {
      $("errorMsg").classList.remove("visible");
    }

    // Extract tokens from the URL hash (#access_token=...&type=recovery)
    function parseHash() {
      const hash = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      return {
        accessToken: params.get("access_token"),
        type: params.get("type"),
      };
    }

    // Esconde o formulário até confirmar sessão de recovery válida
    $("formView").style.display = "none";
    $("subtitle").style.display = "none";

    (function init() {
      if (!sb) {
        $("invalidView").style.display = "";
        return;
      }

      sb.auth.onAuthStateChange((event, session) => {
        if (event === "PASSWORD_RECOVERY") {
          $("formView").style.display = "";
          $("subtitle").style.display = "";
          $("invalidView").style.display = "none";
          $("password").focus();
        } else if (event === "SIGNED_IN" && !session) {
          $("invalidView").style.display = "";
        } else if (event === "SIGNED_OUT") {
          // ignorar — acontece após updateUser + signOut no sucesso
        }
      });
    })();

    $("btnReset").addEventListener("click", async () => {
      hideError();

      const password        = $("password").value;
      const confirmPassword = $("confirmPassword").value;

      if (!password || !confirmPassword) {
        showError("Please fill in both fields."); return;
      }
      if (password.length < 6) {
        showError("Password must be at least 6 characters."); return;
      }
      if (password !== confirmPassword) {
        showError("Passwords do not match."); return;
      }

      $("btnReset").disabled = true;
      $("btnReset").textContent = "Please wait…";

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        $("btnReset").disabled = false;
        $("btnReset").textContent = "Set new password";
        showError("Error: " + error.message);
        return;
      }

      await sb.auth.signOut().catch(() => {});

      $("formView").style.display = "none";
      $("subtitle").style.display = "none";
      $("successView").classList.add("visible");

      setTimeout(() => window.location.replace("login.html"), 3000);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") $("btnReset").click();
    });
  </script>
</body>

</html>
