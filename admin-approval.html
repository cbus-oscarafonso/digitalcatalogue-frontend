<!doctype html>
<html lang="en" style="visibility:hidden;">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin – Approvals</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="auth-guard.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f3f4f6; }
    header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; background:#111827; color:#fff; }
    header button { background:#fff; color:#111827; border:0; padding:8px 12px; border-radius:6px; cursor:pointer; }

    main { padding:20px; display:flex; flex-direction:column; gap:20px; }

    .card { background:#fff; border-radius:10px; padding:16px; box-shadow:0 8px 20px rgba(0,0,0,.08); }

    table { width:100%; border-collapse:collapse; margin-top:12px; }
    th, td { text-align:left; padding:10px; border-bottom:1px solid #e5e7eb; }
    th { font-size:12px; color:#374151; cursor:pointer; user-select:none; }
    td { font-size:13px; }

    .mono { font-family:monospace; font-size:12px; }
    .small { font-size:12px; color:#6b7280; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; background:#fef3c7; color:#92400e; font-size:12px; }

    .btn { padding:8px 10px; border-radius:6px; border:0; cursor:pointer; }
    .btn-primary { background:#111827; color:#fff; }
    .btn-danger { background:#b91c1c; color:#fff; }
  </style>
</head>

<body>
  <header>
    <div><strong>Admin Approvals</strong></div>
    <div>
      <button id="btnRefresh">Refresh</button>
      <button id="btnLogout">Sign out</button>
    </div>
  </header>

  <main>

    <!-- Pending Users -->
    <div class="card">
      <h3>Pending Users</h3>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Requested Company</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="pendingTbody">
          <tr><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Active Users -->
    <div class="card">
      <h3>Active Users</h3>
      <table>
        <thead>
          <tr>
            <th data-key="display_name">User</th>
            <th data-key="email">Email</th>
            <th data-key="role">Role</th>
            <th data-key="customer_name">Customer</th>
            <th data-key="created_at">Created</th>
            <th data-key="approved_at">Approved</th>
            <th data-key="approved_by">Approved By</th>
            <th>User ID</th>
          </tr>
        </thead>
        <tbody id="activeTbody">
          <tr><td colspan="8">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <script src="admin-approval.js"></script>
</body>
</html>
