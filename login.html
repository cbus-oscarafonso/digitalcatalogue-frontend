<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – Digital Catalogue</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script>
    (function () {
      const l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'styles.css?v=' + Date.now();
      document.head.appendChild(l);
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      font-family: "Rubik", system-ui, -apple-system, sans-serif;
      background: var(--bg, #87878720);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px 16px;
    }

    .card {
      background: var(--card, #fff);
      padding: 32px;
      width: 100%;
      max-width: 380px;
      border-radius: var(--radius, 14px);
      box-shadow: var(--shadow, 0 10px 25px rgba(0, 0, 0, .08));
      border: 1px solid var(--line, #e5e7eb);
    }

    h2 {
      margin: 0 0 24px 0;
      font-size: 20px;
      font-weight: 800;
      color: var(--blue, #003764);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray, #878787);
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid var(--line, #e5e7eb);
      border-radius: 10px;
      font: 500 14px "Rubik", system-ui, sans-serif;
      background: #fff;
      color: #111827;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: rgba(0, 55, 100, .35);
      box-shadow: 0 0 0 3px rgba(0, 55, 100, .12);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--blue, #003764);
      background: var(--gray3, rgba(135, 135, 135, .18));
      color: #111827;
      cursor: pointer;
      font: 700 14px "Rubik", system-ui, sans-serif;
      white-space: nowrap;
      transition: transform .12s ease, box-shadow .16s ease, filter .16s ease;
      box-shadow: var(--sh3d, 0 4px 10px rgba(0, 0, 0, .08));
      margin-bottom: 8px;
    }

    .btn:hover { filter: brightness(1.04); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .btn.primary {
      background: var(--blue, #003764);
      border-color: var(--blue, #003764);
      color: #fff;
    }

    .divider {
      height: 1px;
      background: var(--line, #e5e7eb);
      margin: 8px 0 16px;
    }

    .extra-fields { display: none; }
    .extra-fields.visible { display: block; }

    /* Toast — inline to avoid race condition with styles.css */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 24px;
      border-radius: 10px;
      font: 600 14px "Rubik", sans-serif;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .18);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 999;
      text-align: center;
      max-width: 340px;
      white-space: pre-line;
    }

    #toast.show      { opacity: 1; }
    #toast.toast-ok  { background: #003764; color: #fff; }
    #toast.toast-err { background: #b91c1c; color: #fff; }
  </style>
</head>

<body>
  <div class="card">
    <h2 id="cardTitle">Login</h2>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="off" />

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="off" />

    <!-- Confirm password – signup only -->
    <div id="confirmPasswordField" class="extra-fields">
      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" type="password" autocomplete="off" />
    </div>

    <!-- Full name – shown in both signup modes -->
    <div id="sharedSignupFields" class="extra-fields">
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" autocomplete="off" />
    </div>

    <!-- Client signup only: company name -->
    <div id="clientSignupFields" class="extra-fields">
      <label for="companyName">Company Name</label>
      <input id="companyName" type="text" autocomplete="off" />
    </div>

    <!-- Internal signup only: role dropdown -->
    <div id="internalSignupFields" class="extra-fields">
      <label for="internalRole">Role</label>
      <select id="internalRole">
        <option value="internal" selected>General</option>
        <option value="client_manager">Client Manager</option>
        <option value="catalog_manager">Catalog Manager</option>
      </select>
    </div>

    <!-- LOGIN mode buttons -->
    <div id="loginModeButtons">
      <button id="btnLogin" class="btn primary" type="button">Sign in</button>
      <button id="btnForgotPassword" class="btn" type="button">Forgot password?</button>
      <div class="divider"></div>
      <button id="btnShowClientSignup" class="btn" type="button">Create client user account</button>
      <button id="btnShowInternalSignup" class="btn" type="button">Create internal user account</button>
    </div>

    <!-- CLIENT SIGNUP mode buttons -->
    <div id="clientSignupModeButtons" style="display:none;">
      <button id="btnDoClientSignup" class="btn primary" type="button">Create client user account</button>
      <button id="btnCancelClientSignup" class="btn" type="button">Cancel</button>
    </div>

    <!-- INTERNAL SIGNUP mode buttons -->
    <div id="internalSignupModeButtons" style="display:none;">
      <button id="btnDoInternalSignup" class="btn primary" type="button">Create internal user account</button>
      <button id="btnCancelInternalSignup" class="btn" type="button">Cancel</button>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const sb = window.sb;
    const $ = (id) => document.getElementById(id);

    let mode = "login";
    let toastTimer = null;
    let loginFailCount = 0;
    let loginLocked = false;

    // ── Toast ─────────────────────────────────────────────
    function showToast(text, ok = true) {
      const t = $("toast");
      t.textContent = text;
      t.className = ok ? "show toast-ok" : "show toast-err";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 4000);
    }

    if (!sb) {
      showToast("Supabase client missing. Check supabase-client.js.", false);
    }

    // Show messages if redirected here by auth-guard
    (function showAuthGuardMessage() {
      let reason = null;
      try {
        reason = sessionStorage.getItem("authError");
        if (reason) sessionStorage.removeItem("authError");
      } catch { }
      if (reason === "pending")              showToast("Account created. Awaiting approval.", false);
      else if (reason === "profile_missing") showToast("Account exists but profile is missing. Please contact support.", false);
      else if (reason === "blocked")         showToast("Account not active. Please contact support.", false);
    })();

    // ── Loading state ─────────────────────────────────────
    function setLoading(btnId, loading, originalText) {
      const btn = $(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? "Please wait…" : originalText;
    }

    // ── Mode ──────────────────────────────────────────────
    function setMode(newMode) {
      mode = newMode;
      const isLogin    = mode === "login";
      const isClient   = mode === "client";
      const isInternal = mode === "internal";
      const isSignup   = isClient || isInternal;

      if (isLogin)         $("cardTitle").textContent = "Login";
      else if (isClient)   $("cardTitle").textContent = "Create client user account";
      else if (isInternal) $("cardTitle").textContent = "Create internal user account";

      $("confirmPasswordField").classList.toggle("visible", isSignup);
      $("sharedSignupFields").classList.toggle("visible", isSignup);
      $("clientSignupFields").classList.toggle("visible", isClient);
      $("internalSignupFields").classList.toggle("visible", isInternal);

      $("loginModeButtons").style.display          = isLogin    ? "" : "none";
      $("clientSignupModeButtons").style.display   = isClient   ? "" : "none";
      $("internalSignupModeButtons").style.display = isInternal ? "" : "none";

      setTimeout(() => isLogin ? $("email").focus() : $("fullName").focus(), 50);
    }

    function clearFields() {
      $("email").value           = "";
      $("password").value        = "";
      $("confirmPassword").value = "";
      $("fullName").value        = "";
      $("companyName").value     = "";
      $("internalRole").value    = "internal";
    }

    function readReturnTo() {
      let returnTo = "index.html";
      try {
        const v = sessionStorage.getItem("returnTo");
        if (v) { returnTo = v; sessionStorage.removeItem("returnTo"); }
      } catch { }
      if (String(returnTo).includes("login.html")) returnTo = "index.html";
      return returnTo;
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    async function checkProfileStatusOrFail(userId) {
      const { data, error } = await sb
        .from("profiles")
        .select("status")
        .eq("user_id", userId)
        .maybeSingle();

      if (error) return { ok: false, reason: "rls" };
      if (!data)  return { ok: false, reason: "profile_missing" };
      const status = String(data.status || "").toLowerCase();
      if (status !== "active") return { ok: false, reason: status };
      return { ok: true };
    }

    // ── Sign in ──────────────────────────────────────────
    $("btnLogin").addEventListener("click", async () => {
      if (!sb) { showToast("Supabase client missing.", false); return; }
      if (loginLocked) { showToast("Too many failed attempts. Please wait a moment.", false); return; }

      const email    = $("email").value.trim();
      const password = $("password").value;

      if (!email || !password) { showToast("Please enter email and password.", false); return; }
      if (!isValidEmail(email)) { showToast("Please enter a valid email address.", false); return; }

      setLoading("btnLogin", true, "Sign in");

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        setLoading("btnLogin", false, "Sign in");
        loginFailCount++;
        if (loginFailCount >= 3) {
          loginLocked = true;
          showToast("Too many failed attempts. Please wait 30 seconds.", false);
          setTimeout(() => { loginLocked = false; loginFailCount = 0; }, 30000);
        } else {
          showToast("Login error: " + error.message, false);
        }
        return;
      }

      loginFailCount = 0;

      const userId = data?.user?.id;
      if (!userId) {
        await sb.auth.signOut().catch(() => {});
        setLoading("btnLogin", false, "Sign in");
        showToast("Login error: missing user id.", false);
        return;
      }

      const chk = await checkProfileStatusOrFail(userId);
      if (!chk.ok) {
        await sb.auth.signOut().catch(() => {});
        setLoading("btnLogin", false, "Sign in");
        if (chk.reason === "pending")              showToast("Account created. Awaiting approval.", false);
        else if (chk.reason === "profile_missing") showToast("Account exists but profile is missing. Please contact support.", false);
        else if (chk.reason === "rls")             showToast("Account check failed. Contact support.", false);
        else                                       showToast("Account not active. Please contact support.", false);
        return;
      }

      showToast("✔ Approved. Redirecting…", true);
      setTimeout(() => window.location.replace(readReturnTo()), 800);
    });

    // ── Mode switches ─────────────────────────────────────
    $("btnShowClientSignup").addEventListener("click",   () => setMode("client"));
    $("btnShowInternalSignup").addEventListener("click", () => setMode("internal"));

    $("btnCancelClientSignup").addEventListener("click",   () => { clearFields(); setMode("login"); });
    $("btnCancelInternalSignup").addEventListener("click", () => { clearFields(); setMode("login"); });

    // ── Client signup ─────────────────────────────────────
    $("btnDoClientSignup").addEventListener("click", async () => {
      if (!sb) { showToast("Supabase client missing.", false); return; }
      const email           = $("email").value.trim();
      const password        = $("password").value;
      const confirmPassword = $("confirmPassword").value;
      const fullName        = $("fullName").value.trim();
      const companyName     = $("companyName").value.trim();

      if (!email || !password || !confirmPassword || !fullName || !companyName) {
        showToast("Please fill in all fields.", false); return;
      }
      if (!isValidEmail(email)) { showToast("Please enter a valid email address.", false); return; }
      if (password !== confirmPassword) { showToast("Passwords do not match.", false); return; }

      setLoading("btnDoClientSignup", true, "Create client user account");

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName, requested_customer_name: companyName } }
      });

      setLoading("btnDoClientSignup", false, "Create client user account");
      if (error) { showToast("Signup error: " + error.message, false); return; }

      clearFields();
      setMode("login");
      showToast("Account created. Awaiting approval.", true);
    });

    // ── Internal signup ───────────────────────────────────
    $("btnDoInternalSignup").addEventListener("click", async () => {
      if (!sb) { showToast("Supabase client missing.", false); return; }
      const email           = $("email").value.trim();
      const password        = $("password").value;
      const confirmPassword = $("confirmPassword").value;
      const fullName        = $("fullName").value.trim();
      const role            = $("internalRole").value;

      if (!email || !password || !confirmPassword || !fullName) {
        showToast("Please fill in all fields.", false); return;
      }
      if (!isValidEmail(email)) { showToast("Please enter a valid email address.", false); return; }
      if (password !== confirmPassword) { showToast("Passwords do not match.", false); return; }

      setLoading("btnDoInternalSignup", true, "Create internal user account");

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName, role: role } }
      });

      setLoading("btnDoInternalSignup", false, "Create internal user account");
      if (error) { showToast("Signup error: " + error.message, false); return; }

      clearFields();
      setMode("login");
      showToast("Account created. Awaiting approval.", true);
    });

    // ── Forgot password ───────────────────────────────────
    $("btnForgotPassword").addEventListener("click", async () => {
      if (!sb) { showToast("Supabase client missing.", false); return; }
      const email = $("email").value.trim();
      if (!email) { showToast("Please enter your email address first.", false); $("email").focus(); return; }
      if (!isValidEmail(email)) { showToast("Please enter a valid email address.", false); $("email").focus(); return; }

      setLoading("btnForgotPassword", true, "Forgot password?");
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: "https://cbus-oscarafonso.github.io/digitalcatalogue-frontend"
      });
      setLoading("btnForgotPassword", false, "Forgot password?");

      if (error) { showToast("Error: " + error.message, false); return; }
      showToast("Password reset email sent. Check your inbox.", true);
    });

    // ── Enter key ─────────────────────────────────────────
    document.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (mode === "login")    { $("btnLogin").click(); return; }
      if (mode === "client")   { $("btnDoClientSignup").click(); return; }
      if (mode === "internal") { $("btnDoInternalSignup").click(); return; }
    });

    // ── Init ──────────────────────────────────────────────
    $("email").focus();
  </script>
</body>

</html>
