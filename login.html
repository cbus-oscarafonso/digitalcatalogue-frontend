<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – Digital Catalogue</title>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Your shared Supabase client (creates window.sb) -->
  <script src="supabase-client.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 32px;
      width: 340px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
      line-height: 1.3;
      word-break: break-word;
    }

    .ok {
      color: green;
    }

    .err {
      color: red;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Login</h2>

    <label>Email</label>
    <input id="email" type="email" autocomplete="email" />

    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" />

    <!-- Signup-only fields -->
    <label id="fullNameLabel" style="display:none;">Full Name</label>
    <input id="fullName" type="text" style="display:none;" autocomplete="name" />

    <label id="companyLabel" style="display:none;">Company Name</label>
    <input id="companyName" type="text" style="display:none;" />

    <button id="btnLogin" type="button">Sign in</button>
    <button id="btnLogout" type="button" style="margin-top:8px;">Sign out</button>

    <button id="btnSignup" type="button" style="margin-top:8px;">
      Create account
    </button>

    <div id="status" class="msg"></div>
  </div>

  <script>
    // --- REQUIRED: shared client from supabase-client.js ---
    const sb = window.sb;
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    const fullNameLabel = $("fullNameLabel");
    const fullNameInput = $("fullName");
    const companyLabel = $("companyLabel");
    const companyInput = $("companyName");

    let signupMode = false;

    function setMessage(text, success = false) {
      statusEl.textContent = text;
      statusEl.className = "msg " + (success ? "ok" : "err");
    }

    if (!sb) {
      console.error("supabase-client.js not loaded (window.sb missing)");
      setMessage("Supabase client missing. Check supabase-client.js.", false);
    }

    function setSignupMode(on) {
      signupMode = !!on;

      fullNameLabel.style.display = signupMode ? "block" : "none";
      fullNameInput.style.display = signupMode ? "block" : "none";

      companyLabel.style.display = signupMode ? "block" : "none";
      companyInput.style.display = signupMode ? "block" : "none";
    }

    function readReturnTo() {
      let returnTo = "index.html";
      try {
        const v = sessionStorage.getItem("returnTo");
        if (v) {
          returnTo = v;
          sessionStorage.removeItem("returnTo");
        }
      } catch { }

      // never loop back to login
      if (String(returnTo).includes("login.html")) returnTo = "index.html";
      return returnTo;
    }

    // show message if we were blocked by auth-guard
    (function showAuthGuardMessage() {
      let reason = null;
      try {
        reason = sessionStorage.getItem("authError");
        if (reason) sessionStorage.removeItem("authError");
      } catch { }

      if (reason === "pending") {
        setMessage("Account created. Awaiting approval.", false);
      } else if (reason === "profile_missing") {
        setMessage("Account exists but profile is missing. Please contact support.", false);
      } else if (reason === "blocked") {
        setMessage("Account not active. Please contact support.", false);
      }
    })();

    async function refreshStatus() {
      if (!sb) return;
      const { data, error } = await sb.auth.getSession();

      if (error) {
        setMessage("Session error: " + error.message, false);
        return;
      }

      if (data.session) {
        setMessage("✔ Logged in as " + (data.session.user?.email || ""), true);
      } else {
        setMessage("Not authenticated", false);
      }
    }

    async function checkProfileStatusOrFail(userId) {
      const { data, error } = await sb
        .from("profiles")
        .select("status")
        .eq("user_id", userId)
        .maybeSingle();

      if (error) return { ok: false, reason: "rls", detail: error.message };
      if (!data) return { ok: false, reason: "profile_missing" };

      const status = String(data.status || "").toLowerCase();
      if (status !== "active") return { ok: false, reason: status };

      return { ok: true };
    }

    $("btnLogin").addEventListener("click", async () => {
      if (!sb) { setMessage("Supabase client missing. Check supabase-client.js.", false); return; }

      const email = $("email").value.trim();
      const password = $("password").value;

      if (!email || !password) {
        setMessage("Please enter email and password.", false);
        return;
      }

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        setMessage("Login error: " + error.message, false);
        return;
      }

      const userId = data?.user?.id;
      if (!userId) {
        await sb.auth.signOut().catch(() => { });
        setMessage("Login error: missing user id.", false);
        return;
      }

      const chk = await checkProfileStatusOrFail(userId);

      if (!chk.ok) {
        await sb.auth.signOut().catch(() => { });

        if (chk.reason === "pending") {
          setMessage("Account created. Awaiting approval.", false);
        } else if (chk.reason === "profile_missing") {
          setMessage("Account exists but profile is missing. Please contact support.", false);
        } else if (chk.reason === "blocked") {
          setMessage("Account not active. Please contact support.", false);
        } else if (chk.reason === "rls") {
          setMessage("Account check failed (RLS/table). Contact support.", false);
        } else {
          setMessage("Account not active. Please contact support.", false);
        }
        return;
      }

      const returnTo = readReturnTo();
      setMessage("✔ Approved. Redirecting…", true);
      window.location.replace(returnTo);
    });

    $("btnSignup").addEventListener("click", async () => {
      if (!sb) { setMessage("Supabase client missing. Check supabase-client.js.", false); return; }

      // First click toggles signup mode (shows fields)
      if (!signupMode) {
        setSignupMode(true);
        setMessage("Fill Full Name + Company Name, then click Create account again.", true);
        return;
      }

      const email = $("email").value.trim();
      const password = $("password").value;
      const fullName = fullNameInput.value.trim();
      const companyName = companyInput.value.trim();

      // No blanks allowed
      if (!email || !password || !fullName || !companyName) {
        setMessage("Please enter email, password, full name and company name.", false);
        return;
      }

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: fullName,
            requested_customer_name: companyName
          }
        }
      });

      if (error) {
        setMessage("Signup error: " + error.message, false);
        return;
      }

      setMessage("Account created. Awaiting approval (and/or email confirmation).", false);

      // reset UI back to login mode
      setSignupMode(false);
      fullNameInput.value = "";
      companyInput.value = "";
    });

    $("btnLogout").addEventListener("click", async () => {
      if (!sb) { setMessage("Supabase client missing. Check supabase-client.js.", false); return; }

      const { error } = await sb.auth.signOut();

      if (error) {
        setMessage("Logout error: " + error.message, false);
        return;
      }

      setMessage("Logged out.", true);
      await refreshStatus();
    });

    // Enter key submits login (only in login mode)
    $("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !signupMode) $("btnLogin").click();
    });

    refreshStatus();
  </script>
</body>

</html>
