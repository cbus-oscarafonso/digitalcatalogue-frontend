<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login – Digital Catalogue</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 32px;
      width: 340px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h2 { margin-top: 0; }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
      line-height: 1.3;
      word-break: break-word;
    }

    .ok { color: green; }
    .err { color: red; }
  </style>
</head>

<body>
  <div class="card">
    <h2 id="formTitle">Login</h2>

    <label>Email</label>
    <input id="email" type="email" autocomplete="email" />

    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" />

    <label id="companyLabel" style="display:none;">Company Name</label>
    <input id="companyName" type="text" style="display:none;" />

    <button id="btnLogin" type="button">Sign in</button>
    <button id="btnSignup" type="button" style="margin-top:8px;">
      Create account
    </button>
    <button id="btnLogout" type="button" style="margin-top:8px;">
      Sign out
    </button>

    <div id="status" class="msg"></div>
  </div>

  <script>
    const sb = window.sb;
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");

    const companyLabel = $("companyLabel");
    const companyInput = $("companyName");
    const formTitle = $("formTitle");

    let mode = "login";

    function setMessage(text, success = false) {
      statusEl.textContent = text;
      statusEl.className = "msg " + (success ? "ok" : "err");
    }

    if (!sb) {
      console.error("supabase-client.js not loaded (window.sb missing)");
      setMessage("Supabase client missing. Check supabase-client.js.", false);
    }

    function readReturnTo() {
      let returnTo = "index.html";
      try {
        const v = sessionStorage.getItem("returnTo");
        if (v) {
          returnTo = v;
          sessionStorage.removeItem("returnTo");
        }
      } catch {}

      if (String(returnTo).includes("login.html")) returnTo = "index.html";
      return returnTo;
    }

    (function showAuthGuardMessage() {
      let reason = null;
      try {
        reason = sessionStorage.getItem("authError");
        if (reason) sessionStorage.removeItem("authError");
      } catch {}

      if (reason === "pending") {
        setMessage("Account created. Awaiting approval.", false);
      } else if (reason === "profile_missing") {
        setMessage("Account exists but profile is missing. Please contact support.", false);
      } else if (reason === "blocked") {
        setMessage("Account not active. Please contact support.", false);
      }
    })();

    async function checkProfileStatusOrFail(userId) {
      const { data, error } = await sb
        .from("profiles")
        .select("status")
        .eq("user_id", userId)
        .maybeSingle();

      if (error) return { ok: false, reason: "rls" };
      if (!data) return { ok: false, reason: "profile_missing" };

      const status = String(data.status || "").toLowerCase();
      if (status !== "active") return { ok: false, reason: status };

      return { ok: true };
    }

    function switchToSignup() {
      mode = "signup";
      formTitle.textContent = "Create Account";
      companyLabel.style.display = "block";
      companyInput.style.display = "block";
    }

    function switchToLogin() {
      mode = "login";
      formTitle.textContent = "Login";
      companyLabel.style.display = "none";
      companyInput.style.display = "none";
    }

    $("btnLogin").addEventListener("click", async () => {
      if (!sb) return;

      if (mode === "signup") {
        switchToLogin();
        return;
      }

      const email = $("email").value.trim();
      const password = $("password").value;

      if (!email || !password) {
        setMessage("Please enter email and password.", false);
        return;
      }

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        setMessage("Login error: " + error.message, false);
        return;
      }

      const userId = data?.user?.id;
      const chk = await checkProfileStatusOrFail(userId);

      if (!chk.ok) {
        await sb.auth.signOut().catch(() => {});

        if (chk.reason === "pending") {
          setMessage("Account created. Awaiting approval.", false);
        } else if (chk.reason === "profile_missing") {
          setMessage("Account exists but profile is missing. Please contact support.", false);
        } else {
          setMessage("Account not active. Please contact support.", false);
        }
        return;
      }

      setMessage("✔ Approved. Redirecting…", true);
      window.location.replace(readReturnTo());
    });

    $("btnSignup").addEventListener("click", async () => {
      if (!sb) return;

      if (mode === "login") {
        switchToSignup();
        return;
      }

      const email = $("email").value.trim();
      const password = $("password").value;
      const companyName = companyInput.value.trim();

      if (!email || !password || !companyName) {
        setMessage("Please enter email, password and company name.", false);
        return;
      }

      const { error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { requested_customer_name: companyName }
        }
      });

      if (error) {
        setMessage("Signup error: " + error.message, false);
        return;
      }

      setMessage("Account created. Awaiting approval (and/or email confirmation).", false);
      switchToLogin();
    });

    $("btnLogout").addEventListener("click", async () => {
      if (!sb) return;
      await sb.auth.signOut();
      setMessage("Logged out.", true);
    });

    $("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") $("btnLogin").click();
    });
  </script>
</body>

</html>
