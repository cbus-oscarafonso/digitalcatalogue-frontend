<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="utf-8" />

  <style>
    html {
      visibility: hidden;
    }
  </style>

  <!-- Google Font: Rubik -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client area</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <!-- Auth guard -->
  <script src="auth-guard.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <a href="index.html" title="Voltar ao catálogo">
        <img src="assets/logo.svg" alt="CATÁLOGO" class="brandLogo">
      </a>
    </div>

    <div class="crumbs"></div>

    <div class="topRightTitle">Client area</div>

    <div class="topLinks">
      <button class="clientBtn btn-admin" id="btnAdminArea" style="display:none;" type="button">
        Admin area
      </button>
      <button class="clientBtn btn-admin" id="btnCatalogManager" style="display:none;" type="button">
        Catalog Manager
      </button>
      <button class="clientBtn btn-signout" id="btnLogout" title="Sign out" aria-label="Sign out" type="button">
        Sign out
      </button>
    </div>
  </header>

  <main class="layout layoutClient">
    <!-- LEFT: orders list -->
    <aside class="left">
      <div class="panel">
        <div class="panelTop">
          <div class="panelTitle">Order request history</div>
        </div>

        <div class="list">
          <div class="listHeader">
            <div>Requests</div>
          </div>
          <div class="listBody" id="ordersList">
            <div class="listEmpty">A carregar…</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- CENTER: txt viewer -->
    <section class="mid">
      <div class="panel">
        <div class="panelTop">
          <div class="panelTitle">Selected request</div>
        </div>

        <div class="viewerWrap">
          <pre class="txtViewer" id="txtViewer">Seleciona um pedido à esquerda.</pre>
        </div>
      </div>
    </section>

    <!-- RIGHT: catalogues -->
    <aside class="right">
      <div class="panel">
        <div class="panelTop">
          <div class="panelTitle">Digital catalogues available</div>
        </div>

        <div class="list">
          <div class="listHeader">
            <div>Catalogues</div>
          </div>
          <div class="listBody" id="cataloguesList">
            <div class="listEmpty">A carregar…</div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <script>
    (async () => {
      const session = await window.requireAuth("login.html");
      if (!session) return;

      window.__session = session;

      // Show Catalog Manager button for admin and catalog_manager roles
      try {
        const { data: prof } = await window.sb
          .from("profiles")
          .select("role")
          .eq("user_id", session.user.id)
          .maybeSingle();

        const role = prof?.role || "";
        if (role === "admin" || role === "client_manager") {
          const btnAdmin = document.getElementById("btnAdminArea");
          if (btnAdmin) {
            btnAdmin.style.display = "";
            btnAdmin.addEventListener("click", () => window.location.href = "admin-approval.html");
          }
        }
        if (role === "admin" || role === "catalog_manager") {
          const btn = document.getElementById("btnCatalogManager");
          if (btn) {
            btn.style.display = "";
            btn.addEventListener("click", () => window.location.href = "catalog-manager.html");
          }
        }
      } catch {}

      const v = Date.now();

      const s = document.createElement("script");
      s.src = "client-area.js?v=" + v;
      document.body.appendChild(s);

      const logout = document.createElement("script");
      logout.src = "logout.js?v=" + v;
      document.body.appendChild(logout);
    })();
  </script>
</body>

</html>
