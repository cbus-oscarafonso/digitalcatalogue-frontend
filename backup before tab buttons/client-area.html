<!doctype html>
<html lang="pt-PT">

<head>
  <meta charset="utf-8" />

  <style>
    html {
      visibility: hidden;
    }

    /* ── Layout override: orders fills all remaining width ──────────── */
    .layoutClient {
      display: flex !important;
      flex-direction: row !important;
      align-items: stretch !important;
      gap: 18px;
      padding: 18px;
      height: calc(100vh - var(--topbar-h, 56px));
      box-sizing: border-box;
      overflow: hidden;
    }

    /* Orders section: grow to fill all space left by the aside */
    .layoutClient > .mid {
      flex: 1 1 0 !important;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* Catalogs aside: fixed width, does not grow */
    .layoutClient > .right {
      flex: 0 0 260px;
      min-width: 200px;
      max-width: 300px;
      display: flex;
      flex-direction: column;
    }

    /* ── Admin-style panel shell ────────────────────────────────────── */
    .adminPanel {
      background: var(--card, #fff);
      border: 1px solid var(--line, #e5e7eb);
      border-radius: var(--radius, 14px);
      box-shadow: var(--shadow, 0 10px 25px rgba(0, 0, 0, .08));
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
    }

    .adminPanelTop {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line, #e5e7eb);
      background: var(--blue, #003764);
      border-radius: var(--radius, 14px) var(--radius, 14px) 0 0;
      flex-shrink: 0;
    }

    .panelTitleAdmin {
      font-weight: 700;
      color: #fff;
      font-size: 14px;
      font-family: "Rubik", system-ui, sans-serif;
    }

    /* ── Orders panel: split layout ─────────────────────────────────── */
    .ordersPanel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .ordersSplit {
      display: flex;
      flex: 1;
      gap: 0;
      min-height: 0;
      overflow: hidden;
    }

    /* Left: table */
    .ordersSplitList {
      flex: 1 1 60%;
      min-width: 0;
      overflow: auto;
      border-right: 1px solid var(--border, #e2e8f0);
    }

    /* Right: viewer */
    .ordersSplitViewer {
      flex: 0 0 36%;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewerSubTitle {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted, #94a3b8);
      padding: 0.65rem 1rem 0.4rem;
      border-bottom: 1px solid var(--border, #e2e8f0);
      flex-shrink: 0;
    }

    .ordersSplitViewer .viewerWrap {
      flex: 1;
      overflow: auto;
      padding: 0;
    }

    .ordersSplitViewer .txtViewer {
      margin: 0;
      padding: 1rem;
      min-height: 100%;
    }

    /* ── Orders table ───────────────────────────────────────────────── */
    #ordersTableWrap {
      overflow: auto;
    }

    .ordersTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .ordersTable thead tr {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel-head-bg, #f8fafc);
    }

    .ordersTable th {
      text-align: left;
      padding: 0.55rem 0.85rem;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted, #94a3b8);
      border-bottom: 1px solid var(--border, #e2e8f0);
      white-space: nowrap;
      user-select: none;
    }

    .ordersTable th.sortable { cursor: pointer; }
    .ordersTable th.sortable:hover { color: var(--text, #1e293b); }
    .ordersTable th.sorted { color: var(--accent, #3b82f6); }

    .sortArrow {
      display: inline-block;
      margin-left: 3px;
      font-size: 0.7rem;
      opacity: 1;
    }

    .sortArrow.inactive { opacity: 0.3; }

    .ordersTable td {
      padding: 0.5rem 0.85rem;
      border-bottom: 1px solid var(--border, #e2e8f0);
      color: var(--text, #1e293b);
      white-space: nowrap;
    }

    .ordersTable tr.orderRow {
      cursor: pointer;
      transition: background 0.1s;
    }

    .ordersTable tr.orderRow:hover { background: var(--row-hover, #f1f5f9); }
    .ordersTable tr.orderRow.selected { background: var(--row-selected, #eff6ff); }
    .ordersTable tr.orderRow.selected td { color: var(--accent, #3b82f6); }

    .idCell {
      font-family: monospace;
      font-size: 0.78rem;
      cursor: pointer;
      border-bottom: 1px dashed var(--text-muted, #94a3b8);
      padding-bottom: 1px;
      transition: color 0.15s;
    }

    .idCell:hover { color: var(--accent, #3b82f6); }
    .idCell.copied { color: #22c55e; border-bottom-color: #22c55e; }

    .userCell {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .userEmail {
      font-size: 0.7rem;
      color: var(--text-muted, #94a3b8);
    }

    .emptyCell {
      text-align: center;
      color: var(--text-muted, #94a3b8);
      padding: 1.5rem;
    }

    /* ── Catalogs list (inside admin panel, no extra header) ─────────── */
    .catalogsList {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .catalogsList .listRow {
      display: block;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line, #e5e7eb);
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
    }

    .catalogsList .listRow:last-child { border-bottom: none; }
    .catalogsList .listRow:hover { background: var(--row-hover, #f1f5f9); }

    .catalogsList .listTop {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue, #003764);
    }

    .catalogsList .listSub {
      font-size: 11px;
      color: var(--gray, #878787);
      margin-top: 2px;
    }

    .draftBadge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      background: #fef3c7;
      color: #92400e;
      border-radius: 999px;
      padding: 1px 6px;
      margin-left: 5px;
      vertical-align: middle;
    }

    .listEmpty {
      padding: 1rem;
      font-size: 13px;
      color: var(--gray, #878787);
      text-align: center;
    }
  </style>

  <!-- Google Font: Rubik -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client area</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <!-- Auth guard -->
  <script src="auth-guard.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <a href="index.html" title="Voltar ao catálogo">
        <img src="assets/logo.svg" alt="CATÁLOGO" class="brandLogo">
      </a>
    </div>

    <div class="crumbs"></div>

    <div class="topRightTitle">Client area</div>

    <div class="topLinks">
      <button class="clientBtn btn-admin" id="btnAdminArea" style="display:none;" type="button">
        Admin area
      </button>
      <button class="clientBtn btn-admin" id="btnCatalogManager" style="display:none;" type="button">
        Catalog Manager
      </button>
      <button class="clientBtn btn-signout" id="btnLogout" title="Sign out" aria-label="Sign out" type="button">
        Sign out
      </button>
    </div>
  </header>

  <main class="layout layoutClient">

    <!-- LEFT+CENTER: orders panel — fills all remaining width -->
    <section class="mid" id="ordersPanel">
      <div class="adminPanel">
        <div class="adminPanelTop">
          <div class="panelTitleAdmin">Order Requests</div>
        </div>

        <div class="ordersSplit">
          <!-- Left: sortable table -->
          <div class="ordersSplitList">
            <div id="ordersTableWrap">
              <div class="listEmpty">A carregar…</div>
            </div>
          </div>

          <!-- Right: txt viewer -->
          <div class="ordersSplitViewer">
            <div class="viewerSubTitle">Selected Order Request</div>
            <div class="viewerWrap">
              <pre class="txtViewer" id="txtViewer">Seleciona um pedido à esquerda.</pre>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- RIGHT: catalogues -->
    <aside class="right">
      <div class="adminPanel">
        <div class="adminPanelTop">
          <div class="panelTitleAdmin">Spare Parts Catalogs</div>
        </div>

        <div class="catalogsList" id="cataloguesList">
          <div class="listEmpty">A carregar…</div>
        </div>
      </div>
    </aside>
  </main>

  <script>
    (async () => {
      const session = await window.requireAuth("login.html");
      if (!session) return;

      window.__session = session;

      try {
        const { data: prof } = await window.sb
          .from("profiles")
          .select("role")
          .eq("user_id", session.user.id)
          .maybeSingle();

        const role = prof?.role || "";
        window.__userRole = role;

        if (role === "admin" || role === "client_manager") {
          const btnAdmin = document.getElementById("btnAdminArea");
          if (btnAdmin) {
            btnAdmin.style.display = "";
            btnAdmin.addEventListener("click", () => window.location.href = "admin-approval.html");
          }
        }
        if (role === "admin" || role === "catalog_manager") {
          const btn = document.getElementById("btnCatalogManager");
          if (btn) {
            btn.style.display = "";
            btn.addEventListener("click", () => window.location.href = "catalog-manager.html");
          }
        }
      } catch {}

      const v = Date.now();

      const s = document.createElement("script");
      s.src = "client-area.js?v=" + v;
      document.body.appendChild(s);

      const logout = document.createElement("script");
      logout.src = "logout.js?v=" + v;
      document.body.appendChild(logout);
    })();
  </script>
</body>

</html>
